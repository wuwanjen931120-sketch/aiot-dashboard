<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>系統設定 - 瑕疵辨識與分流系統</title>

  <link rel="stylesheet" href="style.css" />

  <link rel="manifest" href="manifest.webmanifest">
  <meta name="theme-color" content="#0b1220">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <style>
    input{
      width:100%;
      padding:12px 12px;
      border-radius:14px;
      border:1px solid rgba(255,255,255,.12);
      background: rgba(0,0,0,.18);
      color: var(--text);
      outline:none;
      margin-top:10px;
    }
  </style>

  <script defer src="core.js"></script>
  <script defer src="script.js"></script>
</head>
<body>

  <div id="overlay" class="drawerOverlay" onclick="toggleDrawer(false)"></div>
  <aside id="drawer" class="drawer">
    <div class="sidebar" style="display:block; position:static; height:100vh;">
      <div class="brand">
        <div class="logo"></div>
        <div>
          <h1>瑕疵辨識與分流系統</h1>
          <p>多頁系統版本（PWA）</p>
        </div>
      </div>

      <div class="nav">
        <a href="dashboard.html">🏠 Dashboard <span class="pill">Home</span></a>
        <a href="logs.html">🧾 事件紀錄 <span class="pill">Logs</span></a>
        <a href="settings.html">⚙️ 系統設定 <span class="pill">Settings</span></a>
        <button onclick="logout()">🚪 登出 <span class="pill">Logout</span></button>
      </div>
    </div>
  </aside>

  <div class="app">
    <aside class="sidebar">
      <div class="brand">
        <div class="logo"></div>
        <div>
          <h1>瑕疵辨識與分流系統</h1>
          <p>多頁系統版本（PWA）</p>
        </div>
      </div>

      <div class="nav">
        <a href="dashboard.html">🏠 Dashboard <span class="pill">Home</span></a>
        <a href="logs.html">🧾 事件紀錄 <span class="pill">Logs</span></a>
        <a href="settings.html">⚙️ 系統設定 <span class="pill">Settings</span></a>
        <button onclick="logout()">🚪 登出 <span class="pill">Logout</span></button>
      </div>

      <div class="side-footer">
        <button class="btn" onclick="swHardReset()">修復灰底/警告（清快取）</button>
      </div>
    </aside>

    <main class="main">
      <div class="topbar">
        <div class="leftTop">
          <button class="hamburger" onclick="toggleDrawer(true)">☰</button>
          <div class="pageTitle">
            <b>系統設定</b>
            <span>輸入驗證示範（避免輸入資料導致崩潰）</span>
          </div>
        </div>
        <div class="rightTop">
          <button class="btn btnPrimary" onclick="saveSettings()">儲存設定</button>
          <button class="btn" onclick="loadSettings()">載入設定</button>
        </div>
      </div>

      <section class="grid">
        <div class="card span-6">
          <h3>瑕疵連續次數門檻</h3>
          <div style="color:var(--muted); font-size:13px; line-height:1.7;">
            連續判定 NG 達到此值 → 觸發通知（展示）
          </div>
          <input id="ngThreshold" placeholder="例如 3" />
          <div style="color:var(--muted); font-size:12px;">允許範圍：1 ~ 20</div>
        </div>

        <div class="card span-6">
          <h3>FPS 下限警戒</h3>
          <div style="color:var(--muted); font-size:13px; line-height:1.7;">
            FPS 低於此值 → 顯示警告（展示）
          </div>
          <input id="fpsMin" placeholder="例如 12" />
          <div style="color:var(--muted); font-size:12px;">允許範圍：5 ~ 60</div>
        </div>

        <div class="card span-12">
          <h3>目前設定（預覽）</h3>
          <div id="previewBox" style="color:var(--muted); line-height:1.8; font-size:13px; white-space:pre-line;"></div>
        </div>

      
        </div>
      </section>

      <div id="errorBar"></div>
    </main>
  </div>

  <script>
    const KEY = "aiot_settings_v2"; // ✅ 版本 bump，避免舊快取格式污染

    function validateInt(raw, min, max, name){
      // ✅ 全程防爆：trim/長度/字元/數字判斷
      raw = (raw || "").trim();
      if(raw.length === 0) throw new Error(name + " 不可為空");
      if(raw.length > 12) throw new Error(name + " 輸入過長");
      if(hasControlChar(raw)) throw new Error(name + " 含不允許字元");

      const n = Number(raw);
      if(!Number.isFinite(n)) throw new Error(name + " 必須是數字");
      const i = Math.floor(n);
      if(i < min || i > max) throw new Error(`${name} 必須介於 ${min} ~ ${max}`);
      return i;
    }

    function saveSettings(){
      try{
        const ngT = validateInt(document.getElementById("ngThreshold").value, 1, 20, "瑕疵門檻");
        const fps = validateInt(document.getElementById("fpsMin").value, 5, 60, "FPS 下限");

        const data = { ngThreshold: ngT, fpsMin: fps, updatedAt: Date.now() };
        safeSet(KEY, data);                 // ✅ 用 core.js 的 safeSet（不會炸）
        renderPreview(data);
        try{ pushLog("OK", "SETTINGS", "設定已儲存（展示）"); }catch(e){}
        toast("設定已儲存（展示）", "OK");
      }catch(e){
        console.error(e);
        showError(e.message || "儲存失敗");
      }
    }

    function loadSettings(){
      try{
        const data = safeGet(KEY, null);    // ✅ 用 core.js 的 safeGet（不會炸）
        if(!data){
          showError("尚未有設定資料");
          return;
        }
        document.getElementById("ngThreshold").value = data.ngThreshold ?? "";
        document.getElementById("fpsMin").value = data.fpsMin ?? "";
        renderPreview(data);
        try{ pushLog("OK", "SETTINGS", "設定已載入（展示）"); }catch(e){}
      }catch(e){
        console.error(e);
        showError("載入失敗");
      }
    }

    function renderPreview(data){
      const box = document.getElementById("previewBox");
      if(!box) return;
      box.textContent =
        `瑕疵門檻：${safeText(data.ngThreshold)}\n` +
        `FPS 下限：${safeText(data.fpsMin)}\n` +
        `更新時間：${new Date(data.updatedAt || Date.now()).toLocaleString("zh-TW")}`;
    }

    document.addEventListener("DOMContentLoaded", () => loadSettings());

    window.addEventListener("load", () => {
      if ("serviceWorker" in navigator) {
        navigator.serviceWorker.register("./sw.js").catch(console.error);
      }
    });
  </script>
</body>
</html>
